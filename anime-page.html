<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Загрузка...</title>
    <style>
        :root { --neon: #ff4500; }
        body { background: #1a1a1a; color: #eee; font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .back-link { color: var(--neon); text-decoration: none; font-weight: bold; }
        .container { display: flex; gap: 30px; flex-wrap: wrap; margin-top: 20px; }
        .poster { width: 280px; border-radius: 10px; border: 2px solid var(--neon); box-shadow: 0 0 15px rgba(255,69,0,0.3); }
        .info-list p { margin: 8px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .info-list b { color: var(--neon); min-width: 150px; display: inline-block; }
        h1 { text-shadow: 0 0 10px var(--neon); color: var(--neon); }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← На главную</a>
    <h1 id="anime-title">Загрузка...</h1>
    
    <div class="container">
        <img id="anime-img" class="poster" src="" alt="Постер">
        <div id="anime-info" class="info-list">
            <!-- Сюда JS подставит параметры по твоему списку -->
        </div>
    </div>

    <script type="module">
        // 1. Твоя база данных (добавляй сюда новые аниме)
        const animeDatabase = [
            { 
                id: "chainsaw", 
                title: "Человек-бензопила", 
                img: "fate.jpg",
                type: "TV Сериал",
                genres: "Боевик, Ужасы, Сёнэн",
                themes: "Демоны, Охотники",
                japTitle: "Chainsaw Man (チェンソーマン)",
                rating: "18+ (R)",
                status: "Вышло"
            },
            { 
                id: "overlord", 
                title: "Повелитель", 
                img: "overlord.jpg",
                type: "Фильм",
                genres: "Камедия, Фэнтези",
                themes: "Игры, Исекай",
                japTitle: "Overlord (オーバーロード)",
                rating: "16+",
                status: "Завершено"
            }
        ];

        const params = new URLSearchParams(window.location.search);
        const animeId = params.get('id');
        const anime = animeDatabase.find(item => item.id === animeId);

        if (anime) {
            document.getElementById('page-title').innerText = anime.title + " | Rushikadze";
            document.getElementById('anime-title').innerText = anime.title;
            document.getElementById('anime-img').src = anime.img;
            
            // Вставляем параметры в твоем строгом порядке
            document.getElementById('anime-info').innerHTML = `
                <p><b>Тип:</b> ${anime.type}</p>
                <p><b>Жанры:</b> ${anime.genres}</p>
                <p><b>Тема:</b> ${anime.themes}</p>
                <p><b>Японское название:</b> ${anime.japTitle}</p>
                <p><b>Возрастной рейтинг:</b> ${anime.rating}</p>
                <p><b>Статус:</b> ${anime.status}</p>
            `;
        } else {
            document.body.innerHTML = "<h1>Аниме не найдено</h1><a href='index.html' class='back-link'>На главную</a>";
        }
    </script>
</body>
</html>
