<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Загрузка...</title>
    <style>
        :root { --neon: #ff4500; }
        body { background: #1a1a1a; color: #eee; font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .back-link { color: var(--neon); text-decoration: none; font-weight: bold; }
        .container { display: flex; gap: 30px; flex-wrap: wrap; margin-top: 20px; }
        .poster { width: 280px; border-radius: 10px; border: 2px solid var(--neon); box-shadow: 0 0 15px rgba(255,69,0,0.3); }
        .info-list p {
    margin: 8px 0;
    border-bottom: 1px solid #333;
    padding-bottom: 5px;
    
    /* Добавь эти строки: */
    display: flex;
    align-items: flex-start; /* Выравнивание по верхней линии */
}

.info-list b {
    color: var(--neon);
    min-width: 160px; /* Фиксированная ширина для оранжевых слов */
    flex-shrink: 0;   /* Запрещаем оранжевому слову сжиматься */
    display: inline-block;
}

/* Добавь новый стиль для белого текста */
.info-list span {
    flex-grow: 1;    /* Занимает всё оставшееся место */
    word-wrap: break-word;
}

        h1 { text-shadow: 0 0 10px var(--neon); color: var(--neon); margin: 10px 0; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← На главную</a>
    
    <h1 id="anime-title">Загрузка...</h1>

    <div class="container">
        <img id="anime-img" class="poster" src="" alt="Постер">
        <div id="anime-info" class="info-list">
            <!-- Сюда данные подставятся из db.js -->
        </div>
    </div>

    <script type="module">
        // 1. Импортируем твою базу данных из внешнего файла
        import { animeDatabase } from './db.js';

        // 2. Функция, которая наполняет страницу данными
        function displayAnimeData() {
            const params = new URLSearchParams(window.location.search);
            const animeId = params.get('id');

            // Ищем аниме в импортированной базе
            const anime = animeDatabase.find(item => item.id === animeId);

            if (anime) {
                // Обновляем заголовки и картинку
                document.getElementById('page-title').innerText = anime.title + " | RushFull";
                document.getElementById('anime-title').innerText = anime.title;
                document.getElementById('anime-img').src = anime.img;

                // Вставляем все характеристики
                document.getElementById('anime-info').innerHTML = `
    <p><b>Тип:</b> <span>${anime.type}</span></p>
    <p><b>Жанры:</b> <span>${anime.genres}</span></p>
    <p><b>Тема:</b> <span>${anime.themes}</span></p>
    <p><b>Японское название:</b> <span>${anime.japTitle}</span></p>
    <p><b>Возрастной рейтинг:</b> <span>${anime.rating}</span></p>
    <p><b>Статус:</b> <span>${anime.status}</span></p>
`;

            } else {
                // Если аниме с таким ID не найдено
                document.getElementById('anime-title').innerText = "Аниме не найдено";
                document.getElementById('anime-info').innerHTML = "<p>К сожалению, такой страницы не существует.</p>";
            }
        }

        // Запускаем работу!
        displayAnimeData();
    </script>
</body>
</html>
