<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Rushikadze — Энциклопедия аниме</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --neon-color: #ff4500; 
            --neon-glow: 0 0 10px var(--neon-color), 0 0 20px var(--neon-color);
            --anim-speed: 2s;
        }

        body {
            background-color: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        @keyframes neon-pulse {
            0%, 100% {
                box-shadow: 0 0 2px var(--neon-color), 0 0 5px var(--neon-color);
                text-shadow: 0 0 2px var(--neon-color), 0 0 5px var(--neon-color);
                border-color: var(--neon-color);
            }
            50% {
                box-shadow: 0 0 10px var(--neon-color), 0 0 15px var(--neon-color);
                text-shadow: 0 0 8px var(--neon-color), 0 0 12px var(--neon-color);
                border-color: var(--neon-color);
            }
        }

        h1 {
            display: table;
            margin: 20px auto;
            padding-bottom: 10px;
            color: var(--neon-color);
            letter-spacing: 3px;
            border-bottom: 4px solid var(--neon-color);
            text-shadow: var(--neon-glow);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
        }

        .anime-grid {
    display: grid;
    /* На маленьких экранах — 2 колонки, на больших — по 180px */
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
    gap: 15px; /* Уменьшил зазор для мобилок */
    padding: 10px; /* Уменьшил падинг, чтобы не красть место */
    max-width: 1200px;
    margin: 0 auto;
}


        .anime-card {
            background-color: #252525;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            text-align: center;
            border: 2px solid var(--neon-color);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
        }

        .anime-card:hover { transform: translateY(-5px); }

        .anime-card img {
    width: 100%;
    height: 200px; /* Немного уменьшил для баланса */
    object-fit: cover;
}


        .anime-card a {
            display: block;
            padding: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;

	white-space: normal;
	word-wrap: break-word;
	overflow-wrap: break-word;
        }

        .profile-link, .auth-btn {
            background-color: #252525;
            color: var(--neon-color);
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid var(--neon-color);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
            cursor: pointer;
        }

        .profile-link { position: absolute; top: 20px; right: 20px; }

        .auth-container {
	    display: none;
            background-color: #252525;
            max-width: 300px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid var(--neon-color);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
            text-align: center;
        }

        .auth-container input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }

        @media (max-width: 480px) {
            .profile-link { position: static; display: block; width: fit-content; margin: 10px auto; }
        }
	@media (max-width: 380px) {
    .anime-grid {
        /* Если телефон совсем узкий — по 1 карточке в ряд */
        grid-template-columns: 1fr; 
        padding: 15px;
    }
    
    .auth-container {
        width: 85%; /* Чтобы форма не прилипала к краям */
    }
}

    .auth-btn { background: var(--neon-color); }

    .goog-te-banner-frame.skiptranslate { display: none !important; }
    body { top: 0 !important; }
    .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }

.lang-container {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 10000;
    display: flex;
    align-items: center;
    background: rgba(0, 0, 0, 0.8);
    padding: 5px 12px;
    border-radius: 50px;
    border: 2px solid #ff4500; /* Оранжевый неон */
    box-shadow: 0 0 10px rgba(255, 69, 0, 0.7); /* Свечение */
}

.globe-icon {
    font-size: 16px;
    margin-right: 8px;
    filter: drop-shadow(0 0 2px #ff4500);
}

.custom-select {
    background: transparent;
    color: #fff;
    border: none;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    outline: none;
    padding-right: 5px;
}

.custom-select option, .custom-select optgroup {
    background: #1a1a1a;
    color: #fff;
}

.settings-container {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 10000;
}

.settings-btn {
    background: rgba(0, 0, 0, 0.8);
    border: 2px solid #ff4500;
    color: white;
    font-size: 20px;
    padding: 8px;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(255, 69, 0, 0.5);
}

.settings-menu {
    display: none; /* Скрыто по умолчанию */
    position: absolute;
    top: 50px;
    left: 0;
    background: #1a1a1a;
    border: 2px solid #ff4500;
    padding: 15px;
    border-radius: 10px;
    min-width: 150px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
}

.custom-select {
    width: 100%;
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 5px;
    border-radius: 5px;
}

    </style>
</head>
<body>
    
    <div style="position: fixed; top: 15px; left: 15px; z-index: 10000;">
    <button class="settings-btn" onclick="toggleSettings()" style="
        background: rgba(0, 0, 0, 0.8);
        border: 2px solid #ff4500;
        color: white;
        font-size: 20px;
        padding: 8px;
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(255, 69, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        outline: none;
    ">⚙️</button>

    <div id="settings-menu" style="
        display: none;
        position: absolute;
        top: 50px;
        left: 0;
        background: #1a1a1a;
        border: 2px solid #ff4500;
        padding: 15px;
        border-radius: 10px;
        min-width: 200px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    ">
        <a href="profile.html" id="profile-btn" style="
            display: none; 
            color: white; 
            text-decoration: none; 
            font-weight: bold; 
            font-family: sans-serif;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        ">👤 Мой профиль</a>

        <p style="margin: 10px 0 10px 0; font-size: 12px; color: #ff4500; font-family: sans-serif; font-weight: bold;">ВЫБОР ЯЗЫКА:</p>
        <select id="lang-switcher" style="
            width: 100%;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        ">
            <option value="ru">Русский (Оригинал)</option>
            <option value="en">English</option>
        </select>
    </div>
</div>

    <script>
// 1. Открыть/Закрыть меню
function toggleSettings() {
    const menu = document.getElementById('settings-menu');
    menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
}

// 2. Функция ПЕРЕВОДА и СОХРАНЕНИЯ
function changeLanguage(lang) {
    const googleSelect = document.querySelector('.goog-te-combo');
    if (googleSelect) {
        googleSelect.value = lang;
        googleSelect.dispatchEvent(new Event('change'));
        localStorage.setItem('user_lang', lang); // Сохраняем выбор
    } else {
        // Если Google еще не загружен, ждем и пробуем снова
        setTimeout(() => changeLanguage(lang), 500);
    }
}

// 3. Следим за выбором в списке
document.getElementById('lang-switcher').addEventListener('change', function() {
    changeLanguage(this.value);
});

// 4. ПРОВЕРКА ПРИ ЗАГРУЗКЕ САЙТА
window.addEventListener('load', () => {
    const savedLang = localStorage.getItem('user_lang');
    const browserLang = navigator.language.slice(0, 2);
    const finalLang = savedLang || browserLang;

    // Даем Google время загрузиться, затем ставим язык
    setTimeout(() => {
        if (finalLang !== 'ru') {
            changeLanguage(finalLang);
            document.getElementById('lang-switcher').value = finalLang;
        }
    }, 1500);
});

// Закрытие меню при клике мимо
document.addEventListener('click', function(e) {
    const menu = document.getElementById('settings-menu');
    const btn = document.querySelector('.settings-btn');
    if (menu && btn && !btn.contains(e.target) && !menu.contains(e.target)) {
        menu.style.display = 'none';
    }
});
</script>
    <h1 data-key="title" style="text-align: center;">Rushikadze</h1>

    <p style="text-align: center; color: #888; margin-top: 10px;" data-key="welcome">
        Добро пожаловать в международную энциклопедию по Аниме/Манге/Ранобэ.
    </p>

    <div class="auth-container" id="auth-form" style="display: none;">
        <h3 id="form-title" style="color: var(--neon-color);" data-key="reg_title">Регистрация</h3>

        <input type="text" id="username" data-placeholder="nick" placeholder="Ваше имя/Никнейм">
        <input type="text" id="avatar-url" data-placeholder="avatar" placeholder="Ссылка на фото профиля">
        <input type="email" id="email" data-placeholder="email" placeholder="Электронная почта">
        <input type="password" id="pass" data-placeholder="pass" placeholder="Пароль">
        <br>

        <button class="auth-btn" id="main-auth-btn" onclick="handleAuth()" data-key="auth_btn">Зарегистрироваться</button>

        <p style="font-size: 12px; margin-top: 15px; cursor: pointer;" onclick="toggleAuthMode()" id="toggle-link" data-key="toggle_auth">
           Уже есть аккаунт? Войти
        </p>
    </div>

    <div class="anime-grid" id="anime-container"></div>

<script type="module">
  // 1. ИМПОРТЫ (Исправлено: полные ссылки и правильный порядок)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
  import { animeDatabase } from './db.js';

  // 2. КОНФИГ И ИНИЦИАЛИЗАЦИЯ (Исправлено: app перед db)
  const firebaseConfig = {
    apiKey: "AIzaSyCf_jRAqo6l8ycv3YpHylDFdT03V9hgV8Q",
    authDomain: "://firebaseapp.com",
    projectId: "rushikaze-r2o5",
    storageBucket: "rushikaze-r2o5.firebasestorage.app",
    messagingSenderId: "674729217637",
    appId: "1:674729217637:web:246e3fd3250b800df3008c",
    measurementId: "G-4P2GJ8M1YG"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 3. ФУНКЦИИ АВТОРИЗАЦИИ (Исправлено: window. для видимости в HTML)
  window.toggleAuthMode = () => {
    const btn = document.getElementById('main-auth-btn');
    const title = document.getElementById('form-title');
    const link = document.getElementById('toggle-link');
    const nameInput = document.getElementById('username');
    const avatarInput = document.getElementById('avatar-url');

    const currentText = btn.innerText.trim();
    if (currentText === "Создать аккаунт") {
      title.innerText = "Вход";
      btn.innerText = "Войти";
      link.innerText = "Нет аккаунта? Регистрация";
      if(nameInput) nameInput.style.display = "none";
      if(avatarInput) avatarInput.style.display = "none";
    } else {
      title.innerText = "Регистрация";
      btn.innerText = "Создать аккаунт";
      link.innerText = "Уже есть аккаунт? Войти";
      if(nameInput) nameInput.style.display = "block";
      if(avatarInput) avatarInput.style.display = "block";
    }
  };

  window.handleAuth = async () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    const isLoginMode = document.getElementById('main-auth-btn').innerText === "Войти";
    if (!email || !pass) return alert("Введите почту и пароль!");
    try {
      if (isLoginMode) { await signInWithEmailAndPassword(auth, email, pass); alert("С возвращением!"); }
      else { await createUserWithEmailAndPassword(auth, email, pass); alert("Аккаунт создан!"); }
    } catch (e) { alert("Ошибка: " + e.message); }
  };

	
  window.updateAnimeStatus = async (animeId, status) => {
    const user = auth.currentUser;
    if (!user) return alert("Войдите в аккаунт!");
    if (!status) return;
    try {
      const docRef = doc(db, "users", user.uid, "library", String(animeId));
      await setDoc(docRef, { status: status, updatedAt: new Date() }, { merge: true });
      alert("Обновлено!");
    } catch (e) { alert("Ошибка: " + e.message); }
  };

  function animeCardTemplate(anime) {
    return `
      <div class="anime-card">
          <img src="${anime.img}" alt="${anime.title}">
          <a href="${anime.link}">${anime.title}</a>
      </div>
    `;
  }


  function displayAnime() {
    const container = document.getElementById('anime-container');
    if (container) {
      container.innerHTML = animeDatabase.map(anime => animeCardTemplate(anime)).join('');
    }
  }

	    onAuthStateChanged(auth, (user) => {
    const authForm = document.getElementById('auth-form');
    const profileBtn = document.getElementById('profile-btn');

    if (user) {
      if (authForm) authForm.style.display = 'none';
      if (profileBtn) profileBtn.style.display = 'block';
    } else {
      if (authForm) authForm.style.setProperty('display', 'block', 'important');
      if (profileBtn) profileBtn.style.display = 'none';
    }
  });

  displayAnime();

</script>
