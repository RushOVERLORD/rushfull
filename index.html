    <style>
        :root {
            --neon-color: #ff4500; 
            --neon-glow: 0 0 10px var(--neon-color), 0 0 20px var(--neon-color);
            --anim-speed: 2s;
        }

        body {
            background-color: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        @keyframes neon-pulse {
            0%, 100% {
                box-shadow: 0 0 2px var(--neon-color), 0 0 5px var(--neon-color);
                text-shadow: 0 0 2px var(--neon-color), 0 0 5px var(--neon-color);
                border-color: var(--neon-color);
            }
            50% {
                box-shadow: 0 0 10px var(--neon-color), 0 0 15px var(--neon-color);
                text-shadow: 0 0 8px var(--neon-color), 0 0 12px var(--neon-color);
                border-color: var(--neon-color);
            }
        }

        h1 {
            display: table;
            margin: 20px auto;
            padding-bottom: 10px;
            color: var(--neon-color)
            letter-spacing: 3px;
            border-bottom: 4px solid var(--neon-color);
            text-shadow: var(--neon-glow);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
        }

        .anime-grid {
    display: grid;
    /* На маленьких экранах — 2 колонки, на больших — по 180px */
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
    gap: 15px; /* Уменьшил зазор для мобилок */
    padding: 10px; /* Уменьшил падинг, чтобы не красть место */
    max-width: 1200px;
    margin: 0 auto;
}


        /* МЕНЯЕШЬ ТУТ — МЕНЯЕТСЯ ВО ВСЕХ КАРТОЧКАХ */
        .anime-card {
            background-color: #252525;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            text-align: center;
            border: 2px solid var(--neon-color);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
        }

        .anime-card:hover { transform: translateY(-5px); }

        .anime-card img {
    width: 100%;
    height: 200px; /* Немного уменьшил для баланса */
    object-fit: cover;
}


        .anime-card a {
            display: block;
            padding: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
	/*перемешает длинные названия в следующую строку*/
	white-space: normal;
	word-wrap: break-word;
	overflow-wrap: break-word;
        }

        /* Стили кнопок и форм */
        .profile-link, .auth-btn {
            background-color: #252525;
            color: var(--neon-color);
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid var(--neon-color);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
            cursor: pointer;
        }

        .profile-link { position: absolute; top: 20px; right: 20px; }

        .auth-container {
            background-color: #252525;
            max-width: 300px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid var(--neon-color);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
            text-align: center;
        }

        .auth-container input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }

        @media (max-width: 480px) {
            .profile-link { position: static; display: block; width: fit-content; margin: 10px auto; }
        }
	@media (max-width: 380px) {
    .anime-grid {
        /* Если телефон совсем узкий — по 1 карточке в ряд */
        grid-template-columns: 1fr; 
        padding: 15px;
    }
    
    .auth-container {
        width: 85%; /* Чтобы форма не прилипала к краям */
    }
}

    /* Твои старые стили (цвета, шрифты и т.д.) */

<!-- Подключаем Firebase модули через CDN -->
<script type="module">
  // 1. Импорты Firebase - ТУТ БЫЛА ОШИБКА (исправил analytics на auth)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js"; // ИСПРАВЛЕНО

  // 2. ИМПОРТ ТВОЕЙ БАЗЫ
  import { animeDatabase } from './db.js';

  // ... дальше твой конфиг и остальной код без изменений ...

  // Твой конфиг Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCf_jRAqo6l8ycv3YpHylDFdT03V9hgV8Q",
    authDomain: "rushikaze-r2o5.firebaseapp.com",
    projectId: "rushikaze-r2o5",
    storageBucket: "rushikaze-r2o5.firebasestorage.app",
    messagingSenderId: "674729217637",
    appId: "1:674729217637:web:246e3fd3250b800df3008c",
    measurementId: "G-4P2GJ8M1YG"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // --- ЛОГИКА ПЕРЕКЛЮЧЕНИЯ И АВТОРИЗАЦИИ (Твоя текущая) ---
    window.toggleAuthMode = () => {
    const btn = document.getElementById('main-auth-btn');
    const title = document.getElementById('form-title');
    const link = document.getElementById('toggle-link');
    const nameInput = document.getElementById('username');
    const avatarInput = document.getElementById('avatar-url');

    // .trim() удаляет случайные пробелы по краям
    const currentText = btn.innerText.trim();

    if (currentText === "Создать аккаунт") {
      title.innerText = "Вход"; 
      btn.innerText = "Войти";
      link.innerText = "Нет аккаунта? Регистрация";
      if(nameInput) nameInput.style.display = "none"; 
      if(avatarInput) avatarInput.style.display = "none";
    } else {
      title.innerText = "Регистрация"; 
      btn.innerText = "Создать аккаунт";
      link.innerText = "Уже есть аккаунт? Войти";
      if(nameInput) nameInput.style.display = "block"; 
      if(avatarInput) avatarInput.style.display = "block";
    }
  };


  window.handleAuth = async () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    const isLoginMode = document.getElementById('main-auth-btn').innerText === "Войти";
    if (!email || !pass) return alert("Введите почту и пароль!");
    try {
      if (isLoginMode) { await signInWithEmailAndPassword(auth, email, pass); alert("С возвращением!"); }
      else { await createUserWithEmailAndPassword(auth, email, pass); alert("Аккаунт создан!"); }
    } catch (e) { alert("Ошибка: " + e.message); }
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('profile-btn').style.display = 'block';
      document.getElementById('auth-form').style.display = 'none';
    }
  });

  // --- ОТРИСОВКА АНИМЕ (ОБНОВЛЕННЫЙ ШАБЛОН) ---
  function animeCardTemplate(anime) {
    // Мы берем ссылку прямо из объекта anime в db.js
    return `
        <div class="anime-card">
            <img src="${anime.img}" alt="${anime.title}">
            <a href="${anime.link}">${anime.title}</a>
        </div>
    `;
  }

  function displayAnime() {
    const container = document.getElementById('anime-container');
    if (container) {
      // Используем импортированную базу animeDatabase
      container.innerHTML = animeDatabase.map(anime => animeCardTemplate(anime)).join('');
    }
  }

  // Запуск отрисовки и привязка кнопок
  displayAnime();
  
  document.getElementById('toggle-link')?.addEventListener('click', window.toggleAuthMode);
  document.getElementById('main-auth-btn')?.addEventListener('click', window.handleAuth);
</script>

<!-- 2. Логика управления переводом -->
<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'ru', 
            autoDisplay: false
        }, 'google_translate_element');
    }

    function changeLanguage(lang) {
        const select = document.querySelector('.goog-te-combo');
        if (select) {
            select.value = lang;
            select.dispatchEvent(new Event('change'));
        }
    }

    // Ждем загрузки страницы и настраиваем кнопку
    window.addEventListener('load', () => {
        const switcher = document.getElementById('lang-switcher');
        if (switcher) {
            switcher.addEventListener('change', (e) => {
                changeLanguage(e.target.value);
            });
        }
        
        // Авто-определение языка устройства
        const userLang = navigator.language.slice(0, 2);
        setTimeout(() => {
            changeLanguage(userLang);
            if(switcher) switcher.value = userLang;
        }, 1500); 
    });
</script>
