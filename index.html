<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RushFull — Энциклопедия аниме</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --neon-color: #ff4500; 
            --neon-glow: 0 0 10px var(--neon-color), 0 0 20px var(--neon-color);
        }

        body {
            background-color: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 { 
            text-align: center; 
            color: var(--neon-color); 
            text-shadow: var(--neon-glow);
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .anime-card {
            background-color: #252525;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
            border-bottom: 3px solid var(--neon-color);
        }

        .anime-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 15px var(--neon-color);
        }

        .anime-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .anime-card a {
            display: block;
            padding: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .anime-card:hover a {
            color: var(--neon-color);
            text-shadow: 0 0 5px var(--neon-color);
        }

        .profile-link {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #252525;
            color: var(--neon-color);
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid var(--neon-color);
            box-shadow: var(--neon-glow);
            transition: 0.3s;
        }

        .profile-link:hover {
            background-color: var(--neon-color);
            color: white;
            box-shadow: 0 0 30px var(--neon-color);
        }

        @media (max-width: 480px) {
            .profile-link {
                position: static;
                display: block;
                width: fit-content;
                margin: 10px auto;
            }
        }
	/*стиль дизайна формы регистрации*/
        .auth-container {
            background-color: #252525;
            max-width: 300px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--neon-color);
            box-shadow: var(--neon-glow);
            text-align: center;
        }
        .auth-container input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }
        .auth-btn {
            background-color: transparent;
            color: var(--neon-color);
            padding: 10px 20px;
            border: 1px solid var(--neon-color);
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .auth-btn:hover {
            background-color: var(--neon-color);
            color: white;
            box-shadow: var(--neon-glow);
        }

    </style>
</head>
<body>

    <a href="profile.html" class="profile-link" id="profile-btn" style="display: none;">Мой профиль</a>
    
    <h1>Rushikaze</h1>
    <p style="text-align: center; color: #888;">Добропожаловать в международную инцоклопедию, где вы найдёте свежий ветер знаний по аниме/манге/ранобэ, стремительный поток информации.</p>
    <div class="auth-container" id="auth-form">
        <h3 style="color: var(--neon-color);">Вход в систему</h3>
        <input type="email" id="email" placeholder="Электронная почта">
        <input type="password" id="pass" placeholder="Пароль">
        <br>
        <button class="auth-btn" onclick="signUp(document.getElementById('email').value, document.getElementById('pass').value)">
            Создать аккаунт
        </button>
    </div>

    <div class="anime-grid">
	<!--карточка 1-->        
        <div class="anime-card">
            <img src="fate.jpg" alt="Fate">
            <a href="fate_strange_fake.html">Fate/Strange Fake</a>
        </div>
	<!--карточка 2-->
        <div class="anime-card">
            <img src="oshi.jpg" alt="[Oshi no Ko] 3rd Season">
            <a href="oshi_no_Ko_3rd_season.html">Oshi no Ko 3rd Season</a>
        </div>
	<!--карточка 3-->
        <div class="anime-card">
            <img src="frieren.jpg" alt="Sousou no Frieren 2nd Season">
            <a href="sousoufno_frieren_2nd_season.html">Sousou no Frieren 2nd Season </a>
        </div>
	<!--карточка 4-->
        <div class="anime-card">
            <img src="titan.jpg" alt="Shingeki no Kyojin">
            <a href="shingeki_no_kyojin.html">Shingeki no Kyojin</a>
        </div>

     </div>
    <script type="module" src="auth.js"></script>

</body>
</html>
