<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RushFull — Энциклопедия аниме</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --neon-color: #ff4500; 
            --neon-glow: 0 0 10px var(--neon-color), 0 0 20px var(--neon-color);
            --anim-speed: 2s;
        }

        body {
            background-color: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        @keyframes neon-pulse {
            0%, 100% {
                box-shadow: 0 0 2px var(--neon-color), 0 0 5px var(--neon-color);
                text-shadow: 0 0 2px var(--neon-color), 0 0 5px var(--neon-color);
                border-color: var(--neon-color);
            }
            50% {
                box-shadow: 0 0 10px var(--neon-color), 0 0 15px var(--neon-color);
                text-shadow: 0 0 8px var(--neon-color), 0 0 12px var(--neon-color);
                border-color: var(--neon-color);
            }
        }

        h1 {
            display: table;
            margin: 20px auto;
            padding-bottom: 10px;
            color: var(--neon-color);
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 4px solid var(--neon-color);
            text-shadow: var(--neon-glow);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* МЕНЯЕШЬ ТУТ — МЕНЯЕТСЯ ВО ВСЕХ КАРТОЧКАХ */
        .anime-card {
            background-color: #252525;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            text-align: center;
            border: 2px solid var(--neon-color);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
        }

        .anime-card:hover { transform: translateY(-5px); }

        .anime-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .anime-card a {
            display: block;
            padding: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        /* Стили кнопок и форм */
        .profile-link, .auth-btn {
            background-color: #252525;
            color: var(--neon-color);
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid var(--neon-color);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
            cursor: pointer;
        }

        .profile-link { position: absolute; top: 20px; right: 20px; }

        .auth-container {
            background-color: #252525;
            max-width: 300px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid var(--neon-color);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
            text-align: center;
        }

        .auth-container input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }

        @media (max-width: 480px) {
            .profile-link { position: static; display: block; width: fit-content; margin: 10px auto; }
        }
    </style>
</head>
<body>

    <a href="profile.html" class="profile-link" id="profile-btn" style="display: none;">Мой профиль</a>
    
    <h1>Rushikaze</h1>
    <p style="text-align: center; color: #888;">Добро пожаловать в международную энциклопедию аниме!</p>

    <div class="auth-container" id="auth-form">
    <h3 id="form-title" style="color: var(--neon-color);">Регистрация</h3>
    
    <!-- Поле ника скрываем при входе -->
    <input type="text" id="username" placeholder="Ваше имя/Никнейм"> 
    <input type="text" id="avatar-url" placeholder="Ссылка на фото (URL)"> 
    
    <input type="email" id="email" placeholder="Электронная почта">
    <input type="password" id="pass" placeholder="Пароль">
    <br>
    
    <button class="auth-btn" id="main-auth-btn" onclick="handleAuth()">Создать аккаунт</button>
    
    <p style="font-size: 12px; margin-top: 15px; cursor: pointer; text-decoration: underline;" 
       onclick="toggleAuthMode()" id="toggle-link">
       Уже есть аккаунт? Войти
    </p>
</div>


    <!-- 1. ПУСТОЙ КОНТЕЙНЕР ДЛЯ КАРТОЧЕК -->
    <div class="anime-grid" id="anime-container"></div>

<script>
    // 2. ДАННЫЕ (список аниме)
    const animeData = [
        { title: "Fate/Strange Fake", img: "fate.jpg", link: "fate_strange_fake.html" },
        { title: "Oshi no Ko 3rd Season", img: "oshi.jpg", link: "oshi_no_Ko_3rd_season.html" },
        { title: "Sousou no Frieren 2nd", img: "frieren.jpg", link: "sousoufno_frieren_2nd_season.html" },
        { title: "Shingeki no Kyojin", img: "titan.jpg", link: "shingeki_no_kyojin.html" },
        // Сюда можно легко дописывать новые аниме
    ];

    // 3. ФУНКЦИЯ ОТРИСОВКИ
    function renderCards() {
        const container = document.getElementById('anime-container');
        container.innerHTML = animeData.map(anime => `
            <div class="anime-card">
                <img src="${anime.img}" alt="${anime.title}">
                <a href="${anime.link}">${anime.title}</a>
            </div>
        `).join('');
    }

    // 4. ЛОГИКА РЕГИСТРАЦИИ
    function signUp() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const name = document.getElementById('username').value;
        const avatar = document.getElementById('avatar-url').value;

        if (!email || !pass || !name) {
            alert("Заполните имя, почту и пароль!");
            return;
        }
        localStorage.setItem('userEmail', email);
        localStorage.setItem('userName', name);
        localStorage.setItem('userAvatar', avatar || 'https://placeholder.com');

        checkAuth();
        alert("Привет, " + name + "! Регистрация завершена.");
    }

    function checkAuth() {
        if (localStorage.getItem('userEmail')) {
            document.getElementById('profile-btn').style.display = 'block';
            document.getElementById('auth-form').style.display = 'none';
        }
    }

    // ЗАПУСК ВСЕГО ПРИ ЗАГРУЗКЕ
    window.onload = function() {
        renderCards(); // Рисуем карточки
        checkAuth();   // Проверяем вход
    };
</script>

</body>
</html>
