<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RushFull — Энциклопедия аниме</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --neon-color: #ff4500; 
            --neon-glow: 0 0 10px var(--neon-color), 0 0 20px var(--neon-color);
            --anim-speed: 2s; /* Скорость пульсации */
        }

        body {
            background-color: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Постоянная анимация пульсации */
        /* Более плавная и слабая пульсация */
	@keyframes neon-pulse {
    0%, 100% {
        /* Минимальное свечение */
        box-shadow: 0 0 2px var(--neon-color), 0 0 5px var(--neon-color);
        text-shadow: 0 0 2px var(--neon-color), 0 0 5px var(--neon-color);
        border-color: var(--neon-color);
    }
    50% {
        /* Умеренное свечение (было 20px и 35px, стало 10px и 15px) */
        box-shadow: 0 0 10px var(--neon-color), 0 0 15px var(--neon-color);
        text-shadow: 0 0 8px var(--neon-color), 0 0 12px var(--neon-color);
        border-color: var(--neon-color);
    }
}

	h1 {
    display: table; /* Позволяет центрировать элемент и подгоняет ширину под текст */
    margin: 20px auto; /* Центрирует заголовок по горизонтали */
    padding-bottom: 10px;
    color: var(--neon-color);
    text-transform: uppercase; /* Делает все буквы заглавными (стиль киберпанк) */
    letter-spacing: 3px; /* Добавляет немного воздуха между буквами */
    border: none; /* Убеждаемся, что старой рамки нет */
    border-bottom: 4px solid var(--neon-color); /* Та самая неоновая линия снизу */
    text-shadow: var(--neon-glow);
    animation: neon-pulse var(--anim-speed) infinite ease-in-out;
}


        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .anime-card {
            background-color: #252525;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            text-align: center;
            border: 2px solid var(--neon-color); /* Сделал рамку полной */
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
        }

        .anime-card:hover {
            transform: translateY(-5px);
        }

        .anime-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .anime-card a {
            display: block;
            padding: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .profile-link {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #252525;
            color: var(--neon-color);
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid var(--neon-color);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
        }

        .auth-container {
            background-color: #252525;
            max-width: 300px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid var(--neon-color);
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
            text-align: center;
        }

        .auth-container input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }

        .auth-btn {
            background-color: transparent;
            color: var(--neon-color);
            padding: 10px 20px;
            border: 2px solid var(--neon-color);
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            animation: neon-pulse var(--anim-speed) infinite ease-in-out;
        }

        @media (max-width: 480px) {
            .profile-link {
                position: static;
                display: block;
                width: fit-content;
                margin: 10px auto;
            }
        }
    </style>
</head>
<body>

    <a href="profile.html" class="profile-link" id="profile-btn" style="display: none;">Мой профиль</a>
    
    <h1>Rushikaze</h1>
    <p style="text-align: center; color: #888;">Добро пожаловать в международную энциклопедию аниме!</p>

    <div class="auth-container" id="auth-form">
        <h3 style="color: var(--neon-color);">Регистрация</h3>
        <input type="text" id="username" placeholder="Ваше имя/Никнейм"> 
        <input type="text" id="avatar-url" placeholder="Ссылка на фото (URL)"> 
        <input type="email" id="email" placeholder="Электронная почта">
        <input type="password" id="pass" placeholder="Пароль">
        <br>
        <button class="auth-btn" onclick="signUp(
            document.getElementById('email').value, 
            document.getElementById('pass').value, 
            document.getElementById('username').value,
            document.getElementById('avatar-url').value
        )">Создать аккаунт</button>
    </div>

    <div class="anime-grid">
        <div class="anime-card">
            <img src="fate.jpg" alt="Fate">
            <a href="fate_strange_fake.html">Fate/Strange Fake</a>
        </div>
        <div class="anime-card">
            <img src="oshi.jpg" alt="Oshi no Ko">
            <a href="oshi_no_Ko_3rd_season.html">Oshi no Ko 3rd Season</a>
        </div>
        <div class="anime-card">
            <img src="frieren.jpg" alt="Frieren">
            <a href="sousoufno_frieren_2nd_season.html">Sousou no Frieren 2nd</a>
        </div>
        <div class="anime-card">
            <img src="titan.jpg" alt="Titan">
            <a href="shingeki_no_kyojin.html">Shingeki no Kyojin</a>
        </div>
    </div>

<script>
    function signUp(email, pass, name, avatar) {
        if (!email || !pass || !name) {
            alert("Заполните имя, почту и пароль!");
            return;
        }
        localStorage.setItem('userEmail', email);
        localStorage.setItem('userName', name);
        localStorage.setItem('userAvatar', avatar || 'https://placeholder.com');

        document.getElementById('profile-btn').style.display = 'block';
        document.getElementById('auth-form').style.display = 'none';
        alert("Привет, " + name + "! Регистрация завершена.");
    }

    window.onload = function() {
        if (localStorage.getItem('userEmail')) {
            document.getElementById('profile-btn').style.display = 'block';
            document.getElementById('auth-form').style.display = 'none';
        }
    };
</script>

</body>
</html>
