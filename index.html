<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RushFull — Энциклопедия аниме</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --neon-color: #ff4500; 
            --neon-glow: 0 0 10px var(--neon-color), 0 0 20px var(--neon-color);
        }

        body {
            background-color: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 { 
            text-align: center; 
            color: var(--neon-color); 
            text-shadow: var(--neon-glow);
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .anime-card {
            background-color: #252525;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
            border-bottom: 3px solid var(--neon-color);
        }

        .anime-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 15px var(--neon-color);
        }

        .anime-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .anime-card a {
            display: block;
            padding: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .anime-card:hover a {
            color: var(--neon-color);
            text-shadow: 0 0 5px var(--neon-color);
        }

        .profile-link {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #252525;
            color: var(--neon-color);
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid var(--neon-color);
            box-shadow: var(--neon-glow);
            transition: 0.3s;
        }

        .profile-link:hover {
            background-color: var(--neon-color);
            color: white;
            box-shadow: 0 0 30px var(--neon-color);
        }

        @media (max-width: 480px) {
            .profile-link {
                position: static;
                display: block;
                width: fit-content;
                margin: 10px auto;
            }
        }
    </style>
</head>
<body>

    <a href="profile.html" class="profile-link">Мой профиль</a>
    
    <h1>RushFull</h1>
    <p style="text-align: center; color: #888;">Международная энциклопедия по аниме</p>
