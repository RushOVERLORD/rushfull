<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | RushFull</title>
    <style>
        body { background-color: #1a1a1a; color: #eee; font-family: sans-serif; padding: 20px; }
        .profile-container { max-width: 600px; margin: 0 auto; background: #252525; padding: 30px; border-radius: 8px; border-top: 4px solid #ff4500; text-align: center; }
        .full-avatar { width: 150px; height: 150px; border-radius: 12px; object-fit: cover; border: 3px solid #ff4500; margin-bottom: 20px; }
        h1 { color: #ff4500; margin-bottom: 10px; }
        .back-link { color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- Добавили id="user-avatar" -->
        <img src="" alt="Avatar" class="full-avatar" id="user-avatar">
        
        <h1 id="user-name">Загрузка...</h1>
        
        <button onclick="logout()" style="background: none; border: 1px solid #ff4500; color: #ff4500; padding: 8px 20px; border-radius: 20px; cursor: pointer; margin-bottom: 20px;">
            Выйти
        </button>
        <br>
        <a href="index.html" class="back-link">← На главную</a>
    </div>

<script>
    // Достаем данные из памяти
    const savedName = localStorage.getItem('userName');
    const savedEmail = localStorage.getItem('userEmail');
    const savedAvatar = localStorage.getItem('userAvatar');
    
    // 1. Ставим имя
    document.getElementById('user-name').innerText = savedName || savedEmail || 'Гость';
    
    // 2. Ставим аватарку (если нет — ставим заглушку)
    document.getElementById('user-avatar').src = savedAvatar || 'https://placeholder.com';

    function logout() {
        localStorage.clear(); // Удаляет всё сразу
        window.location.href = "index.html";
    }
</script>
</body>
</html>
